<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catalogo de Accesorios | QUIE®</title>
  <meta name="description" content="Catalogo editable de accesorios QUIE® con modelos, descripciones, colores y autenticidad NFC."/>
  <style>
    :root{
      --negro:#2D402E;--gris:#2D402E;--gris2:#2D402E;--texto:#F2F2F2;
      --sutil:#593325;--dorado:#D9A86C;--azul:#2D402E;--verde:#2D402E;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--negro);color:var(--texto);font-family:'Segoe UI',Arial,sans-serif;line-height:1.5}
    a{color:inherit}
    .wrap{width:min(1120px,92vw);margin:0 auto}
    header{position:sticky;top:0;z-index:20;background:rgba(45, 64, 46, .94);border-bottom:1px solid rgba(217, 168, 108, .14);backdrop-filter:blur(14px)}
    nav{height:64px;display:flex;align-items:center;justify-content:space-between;gap:18px}
    .brand{font-weight:900;letter-spacing:3px;color:var(--dorado);font-size:.88rem;text-transform:uppercase}
    .navlinks{display:flex;gap:18px;align-items:center;font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px}
    .navlinks a{text-decoration:none;color:#593325}
    .navlinks a:hover{color:var(--dorado)}
    .hero{padding:72px 0 34px}
    .tag{color:var(--dorado);letter-spacing:4px;text-transform:uppercase;font-size:.68rem;font-weight:800;margin-bottom:14px}
    h1{font-size:clamp(2.4rem,8vw,5.8rem);line-height:.95;text-transform:uppercase;letter-spacing:2px;max-width:850px}
    .lead{color:#593325;max-width:680px;margin-top:18px;font-size:1rem}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 18px;border-radius:6px;text-decoration:none;font-weight:900;font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase}
    .btn.gold{background:var(--dorado);color:#2D402E}
    .btn.ghost{border:1px solid #2D402E;color:#D9A86C}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 26px}
    .filter{background:#2D402E;border:1px solid #2D402E;color:#D9A86C;border-radius:999px;padding:8px 12px;font-size:.75rem;cursor:pointer}
    .filter.active{background:rgba(217, 168, 108, .14);border-color:rgba(217, 168, 108, .55);color:var(--dorado)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding-bottom:72px}
    .card{background:linear-gradient(180deg,#2D402E,#2D402E);border:1px solid #2D402E;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-height:440px}
    .visual{height:150px;background:
      radial-gradient(circle at 25% 20%,rgba(217, 168, 108, .22),transparent 26%),
      linear-gradient(135deg,rgba(45, 64, 46, .45),rgba(217, 168, 108, .08)),
      #2D402E;display:flex;align-items:center;justify-content:center;font-size:56px}
    .visual img{width:100%;height:100%;object-fit:cover;display:block}
    .body{padding:18px;display:flex;flex-direction:column;gap:10px;flex:1}
    .meta{display:flex;gap:8px;flex-wrap:wrap}
    .pill{font-size:.68rem;color:var(--dorado);border:1px solid rgba(217, 168, 108, .24);background:rgba(217, 168, 108, .06);padding:4px 8px;border-radius:999px}
    .pill.green{color:var(--verde);border-color:rgba(45, 64, 46, .28);background:rgba(45, 64, 46, .07)}
    .card h2{font-size:1.08rem;line-height:1.2}
    .short{color:#F2F2F2;font-size:.86rem}
    .desc{color:#593325;font-size:.8rem}
    .spec{border-top:1px solid #2D402E;padding-top:10px;color:#593325;font-size:.74rem}
    .spec strong{color:#D9A86C}
    .card .btn{margin-top:auto;width:100%}
    .empty{padding:42px 0;color:#593325}
    @media(max-width:860px){.grid{grid-template-columns:1fr 1fr}.navlinks{gap:10px}.navlinks a{font-size:.68rem}}
    @media(max-width:620px){.grid{grid-template-columns:1fr}.hero{padding-top:48px}.navlinks a:nth-child(2){display:none}}
  </style>
</head>
<body>
<header>
  <nav class="wrap">
    <div class="brand">QUIE®</div>
    <div class="navlinks">
      <a href="/">Inicio</a>
      <a href="/#autenticidad">NFC</a>
      <a href="/login">Admin</a>
      <a href="https://wa.me/573014586841" target="_blank">WhatsApp</a>
    </div>
  </nav>
</header>

<main class="wrap">
  <section class="hero">
    <div class="tag">Catalogo editable</div>
    <h1>Piezas con identidad propia</h1>
    <p class="lead">Modelos QUIE® con descripcion comercial, opciones de personalizacion y autenticidad NFC para colecciones, empresas y marcas.</p>
    <div class="actions">
      <a class="btn gold" href="https://wa.me/573014586841?text=Hola%20QUIE%2C%20quiero%20cotizar%20una%20pieza%20del%20catalogo" target="_blank">Cotizar catalogo</a>
      <a class="btn ghost" href="/">Volver al sitio</a>
    </div>
  </section>

  <div class="filters" id="filters"></div>
  <section class="grid" id="catalogo"></section>
</main>

<script>
const iconos = {
  Tarjetero: 'T',
  Billetera: 'B',
  'Llavero NFC': 'NFC',
  Correa: 'C',
  'Bolso mini': 'BM',
  Accesorio: 'QUIE'
};
let productos = [];
let filtro = 'Todos';

function modelosDisponibles() {
  return ['Todos'].concat([...new Set(productos.map(p => p.modelo).filter(Boolean))]);
}

function renderFiltros() {
  document.getElementById('filters').innerHTML = modelosDisponibles().map(m =>
    '<button class="filter ' + (m === filtro ? 'active' : '') + '" onclick="filtrarCatalogo(&quot;' + m + '&quot;)">' + m + '</button>'
  ).join('');
}

function filtrarCatalogo(modelo) {
  filtro = modelo;
  renderFiltros();
  renderCatalogo();
}

function renderCatalogo() {
  const cont = document.getElementById('catalogo');
  const lista = filtro === 'Todos' ? productos : productos.filter(p => p.modelo === filtro);
  if (!lista.length) {
    cont.innerHTML = '<div class="empty">No hay productos activos en el catalogo.</div>';
    return;
  }
  cont.innerHTML = lista.map(p => {
    const msg = encodeURIComponent('Hola QUIE®, quiero cotizar: ' + p.nombre);
    return '<article class="card">' +
      '<div class="visual">' + (p.foto_producto ? '<img src="' + p.foto_producto + '" alt="' + p.nombre + '">' : (iconos[p.modelo] || 'QUIE')) + '</div>' +
      '<div class="body">' +
        '<div class="meta">' +
          '<span class="pill">' + (p.modelo || 'Pieza') + '</span>' +
          '<span class="pill">' + (p.color || 'Color a elegir') + '</span>' +
          (p.nfc ? '<span class="pill green">NFC</span>' : '') +
        '</div>' +
        '<h2>' + p.nombre + '</h2>' +
        '<p class="short">' + (p.descripcion_corta || '') + '</p>' +
        '<p class="desc">' + (p.descripcion || '') + '</p>' +
        '<div class="spec"><strong>Materiales:</strong> ' + (p.materiales || 'Segun disponibilidad') + '</div>' +
        '<div class="spec"><strong>Ideal para:</strong> ' + (p.ideal_para || 'Marcas, empresas y colecciones') + '</div>' +
        '<div class="spec"><strong>Personalizacion:</strong> ' + (p.personalizacion || 'Bordado y detalles personalizados') + '</div>' +
        '<a class="btn gold" target="_blank" href="https://wa.me/573014586841?text=' + msg + '">Cotizar este modelo</a>' +
      '</div>' +
    '</article>';
  }).join('');
}

fetch('/api/catalogo')
  .then(r => r.json())
  .then(data => {
    productos = data.productos || [];
    renderFiltros();
    renderCatalogo();
  })
  .catch(() => {
    document.getElementById('catalogo').innerHTML = '<div class="empty">No se pudo cargar el catalogo.</div>';
  });
</script>
</body>
</html>
