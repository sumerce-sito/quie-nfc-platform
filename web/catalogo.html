<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accessories Catalog | QUIE®</title>
  <meta name="description" content="Editable catalog of QUIE® accessories with models, descriptions, colors and NFC authenticity."/>
  <style>
    :root{
      --verde:#2D402E;--arena:#D9A86C;--marfil:#F2F2F2;
      --terracota:#BF5630;--cuero:#593325;--carbon:#1A1A1A;
      --panel:#FBF7EF;--linea:rgba(89,51,37,.18);--sutil:#6F5A4D;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--marfil);color:var(--carbon);font-family:'Segoe UI',Arial,sans-serif;line-height:1.5}
    a{color:inherit}
    .wrap{width:min(1120px,92vw);margin:0 auto}
    header{position:sticky;top:0;z-index:20;background:rgba(242,242,242,.94);border-bottom:1px solid var(--linea);backdrop-filter:blur(14px)}
    nav{height:64px;display:flex;align-items:center;justify-content:space-between;gap:18px}
    .brand{font-weight:900;letter-spacing:3px;color:var(--verde);font-size:.88rem;text-transform:uppercase}
    .navlinks{display:flex;gap:18px;align-items:center;font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px}
    .navlinks a{text-decoration:none;color:var(--verde)}
    .navlinks a:hover{color:var(--terracota)}
    .hero{padding:72px 0 34px}
    .tag{color:var(--terracota);letter-spacing:4px;text-transform:uppercase;font-size:.68rem;font-weight:800;margin-bottom:14px}
    h1{font-size:clamp(2.4rem,8vw,5.8rem);line-height:.95;text-transform:uppercase;letter-spacing:2px;max-width:850px}
    .lead{color:var(--cuero);max-width:680px;margin-top:18px;font-size:1rem}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 18px;border-radius:6px;text-decoration:none;font-weight:900;font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase}
    .btn.gold{background:var(--verde);color:var(--marfil)}
    .btn.ghost{border:1px solid var(--verde);color:var(--verde)}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 26px}
    .filter{background:#fff;border:1px solid var(--linea);color:var(--verde);border-radius:999px;padding:8px 12px;font-size:.75rem;cursor:pointer}
    .filter.active{background:var(--verde);border-color:var(--verde);color:var(--marfil)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding-bottom:72px}
    .card{background:var(--panel);border:1px solid var(--linea);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-height:440px;box-shadow:0 14px 34px rgba(89,51,37,.08)}
    .visual{height:150px;background:
      radial-gradient(circle at 25% 20%,rgba(217, 168, 108, .22),transparent 26%),
      linear-gradient(135deg,rgba(45, 64, 46, .45),rgba(217, 168, 108, .08)),
      var(--verde);display:flex;align-items:center;justify-content:center;font-size:56px;color:var(--arena)}
    .visual img{width:100%;height:100%;object-fit:cover;display:block}
    .body{padding:18px;display:flex;flex-direction:column;gap:10px;flex:1}
    .meta{display:flex;gap:8px;flex-wrap:wrap}
    .pill{font-size:.68rem;color:var(--cuero);border:1px solid rgba(89,51,37,.22);background:rgba(217,168,108,.18);padding:4px 8px;border-radius:999px}
    .pill.green{color:var(--marfil);border-color:var(--verde);background:var(--verde)}
    .product-title{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
    .card h2{font-size:1.08rem;line-height:1.2}
    .short{color:var(--cuero);font-size:.86rem;font-weight:800}
    .desc{color:var(--sutil);font-size:.8rem}
    .spec{border-top:1px solid var(--linea);padding-top:10px;color:var(--sutil);font-size:.74rem}
    .spec strong{color:var(--verde)}
    .card .btn{margin-top:auto;width:100%}
    .empty{padding:42px 0;color:var(--cuero)}
    @media(max-width:860px){.grid{grid-template-columns:1fr 1fr}.navlinks{gap:10px}.navlinks a{font-size:.68rem}}
    @media(max-width:620px){.grid{grid-template-columns:1fr}.hero{padding-top:48px}.navlinks a:nth-child(2){display:none}}
  </style>
</head>
<body>
<header>
  <nav class="wrap">
    <div class="brand">QUIE®</div>
    <div class="navlinks">
      <a href="/">Home</a>
      <a href="/#nfc">NFC</a>
      <a href="/login">Admin</a>
      <a href="https://wa.me/573156056978" target="_blank">WhatsApp</a>
    </div>
  </nav>
</header>

<main class="wrap">
  <section class="hero">
    <div class="tag">2025 Collection</div>
    <h1>Leather made with purpose</h1>
    <p class="lead">Every piece carries history pressed into the leather. Handmade in Colombia, certified with NFC and designed to outlast any trend.</p>
    <div class="actions">
      <a class="btn gold" href="https://wa.me/573156056978?text=Hola%20QUIE%2C%20quiero%20cotizar%20una%20pieza%20del%20catalogo" target="_blank">Request a quote</a>
      <a class="btn ghost" href="/">Back to site</a>
    </div>
  </section>

  <div class="filters" id="filters"></div>
  <section class="grid" id="catalogo"></section>
</main>

<script>
const iconos = {
  Tarjetero: 'T',
  Billetera: 'B',
  'Llavero NFC': 'NFC',
  Correa: 'C',
  'Bolso mini': 'BM',
  Accesorio: 'QUIE'
};
const WHATSAPP = '573156056978';
const productosBase = [
  {
    nombre: 'Tarjetero Origen',
    modelo: 'Tarjetero',
    color: 'Verde profundo',
    foto_producto: '/assets/quie/productos/tarjetero.png',
    descripcion_corta: 'Compact format with NFC series.',
    descripcion: 'Leather card holder for daily use, designed as an entry-level piece to the brand.',
    materiales: 'Premium leather, sand-tone stitching and NTAG213 tag',
    ideal_para: 'Corporate gifts, product launches and VIP clients',
    personalizacion: 'Initials, thread color and digital certificate',
    nfc: true
  },
  {
    nombre: 'Billetera Tierra',
    modelo: 'Billetera',
    color: 'Cuero oscuro',
    foto_producto: '/assets/quie/productos/billetera.png',
    descripcion_corta: 'Daily piece with understated finishes.',
    descripcion: 'Leather wallet with functional compartments and digital authenticity.',
    materiales: 'Leather, textile lining and sand-gold hardware',
    ideal_para: 'Personal use, premium gifts and limited editions',
    personalizacion: 'Internal branding, initials and NFC page',
    nfc: true
  },
  {
    nombre: 'Llavero NFC Sello',
    modelo: 'Llavero NFC',
    color: 'Terracota',
    foto_producto: '/assets/quie/productos/llavero.png',
    descripcion_corta: 'Small accessory with digital verification.',
    descripcion: 'Leather key fob for NFC demos, certification and brand activations.',
    materiales: 'Leather, metal ring and NTAG213 tag',
    ideal_para: 'Events, hackathons, activations and NFC testing',
    personalizacion: 'Engraving, color and authenticity URL',
    nfc: true
  },
  {
    nombre: 'Correa Selva',
    modelo: 'Correa',
    color: 'Verde profundo',
    foto_producto: '/assets/quie/productos/correa.png',
    descripcion_corta: 'Leather, hardware and a discreet stamp.',
    descripcion: 'Premium belt with NFC reading to validate batch, origin and care instructions.',
    materiales: 'Natural grain leather and metal buckle',
    ideal_para: 'Menswear line, executive gift and premium retail',
    personalizacion: 'Size, buckle, initials and certificate',
    nfc: true
  },
  {
    nombre: 'Bolso Raiz',
    modelo: 'Bolso',
    color: 'Terracota y verde',
    foto_producto: '/assets/quie/productos/bolso.png',
    descripcion_corta: 'The most impactful editorial piece.',
    descripcion: 'QUIE bag combining leather, artisan texture and brand presence.',
    materiales: 'Premium leather, internal lining and sand-gold hardware',
    ideal_para: 'Main collection, direct sales and editorial content',
    personalizacion: 'Color, strap, initials and story page',
    nfc: true
  },
  {
    nombre: 'Maletin Ejecutivo Monte',
    modelo: 'Maletin',
    color: 'Cuero oscuro',
    foto_producto: '/assets/quie/productos/maletin-ejecutivo.png',
    descripcion_corta: 'Executive line with NFC traceability.',
    descripcion: 'Laptop and document briefcase with premium finishes and digital certificate.',
    materiales: 'Structured leather, internal compartments and premium hardware',
    ideal_para: 'Executives, corporate gifts and premium pre-orders',
    personalizacion: 'Initials, internal plaque and NFC certificate',
    nfc: true
  }
];
let productos = [];
let filtro = 'All';

function modelosDisponibles() {
  return ['All'].concat([...new Set(productos.map(p => p.modelo).filter(Boolean))]);
}

function renderFiltros() {
  document.getElementById('filters').innerHTML = modelosDisponibles().map(m =>
    '<button class="filter ' + (m === filtro ? 'active' : '') + '" onclick="filtrarCatalogo(&quot;' + m + '&quot;)">' + m + '</button>'
  ).join('');
}

function filtrarCatalogo(modelo) {
  filtro = modelo;
  renderFiltros();
  renderCatalogo();
}

function renderCatalogo() {
  const cont = document.getElementById('catalogo');
  const lista = filtro === 'All' ? productos : productos.filter(p => p.modelo === filtro);
  if (!lista.length) {
    cont.innerHTML = '<div class="empty">No active products in the catalog.</div>';
    return;
  }
  cont.innerHTML = lista.map(p => {
    const msg = encodeURIComponent('Hi QUIE, I want to quote: ' + p.nombre);
    return '<article class="card">' +
      '<div class="visual">' + (p.foto_producto ? '<img src="' + p.foto_producto + '" alt="' + p.nombre + '">' : (iconos[p.modelo] || 'QUIE')) + '</div>' +
      '<div class="body">' +
        '<div class="meta">' +
          '<span class="pill">' + (p.modelo || 'Piece') + '</span>' +
          '<span class="pill">' + (p.color || 'Color to choose') + '</span>' +
          (p.nfc ? '<span class="pill green">NFC</span>' : '') +
        '</div>' +
        '<div class="product-title"><h2>' + p.nombre + '</h2></div>' +
        '<p class="short">' + (p.descripcion_corta || '') + '</p>' +
        '<p class="desc">' + (p.descripcion || '') + '</p>' +
        '<div class="spec"><strong>Materials:</strong> ' + (p.materiales || 'Subject to availability') + '</div>' +
        '<div class="spec"><strong>Ideal for:</strong> ' + (p.ideal_para || 'Brands, companies and collections') + '</div>' +
        '<div class="spec"><strong>Customization:</strong> ' + (p.personalizacion || 'Embroidery and custom details') + '</div>' +
        '<a class="btn gold" target="_blank" href="https://wa.me/' + WHATSAPP + '?text=' + msg + '">Request a quote</a>' +
      '</div>' +
    '</article>';
  }).join('');
}

fetch('/api/catalogo')
  .then(r => r.json())
  .then(data => {
    productos = data.productos && data.productos.length ? data.productos : productosBase;
    renderFiltros();
    renderCatalogo();
  })
  .catch(() => {
    productos = productosBase;
    renderFiltros();
    renderCatalogo();
  });
</script>
</body>
</html>
