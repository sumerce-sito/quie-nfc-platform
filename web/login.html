<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEXO Admin — QUIE®</title>
  <meta name="robots" content="noindex, nofollow"/>
  <style>
    :root{--carbon:#1A1A1A;--dorado:#D9A86C;--blanco:#F2F2F2;
      --rojo:#BF5630;--verde:#2D402E;--cuero:#593325;--panel:#FBF7EF;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--verde);color:var(--carbon);font-family:'Segoe UI',Arial,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:20px;
      background-image:linear-gradient(rgba(45,64,46,.84),rgba(45,64,46,.9)),url('/assets/quie/textures/leather-verde.png');background-size:cover;}

    .login-box{width:100%;max-width:380px;}

    /* LOGO */
    .logo{text-align:center;margin-bottom:40px;}
    .logo .escudo{font-size:56px;display:block;margin-bottom:12px;}
    .logo h1{font-size:1.1rem;font-weight:900;letter-spacing:4px;color:var(--dorado);}
    .logo p{font-size:.7rem;color:var(--blanco);letter-spacing:2px;margin-top:4px;opacity:.9;}

    /* CARD */
    .card{background:var(--panel);border:1px solid rgba(217, 168, 108, .5);border-radius:14px;padding:32px;
      box-shadow:0 24px 70px rgba(0,0,0,.28);}
    .card h2{font-size:.7rem;letter-spacing:3px;color:var(--verde);text-transform:uppercase;
      margin-bottom:24px;text-align:center;}

    /* FORM */
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:.7rem;color:var(--cuero);letter-spacing:1px;
      text-transform:uppercase;margin-bottom:6px;}
    input{width:100%;background:#fff;border:1px solid rgba(89,51,37,.22);color:var(--carbon);
      padding:12px 14px;border-radius:8px;font-size:.9rem;outline:none;
      transition:border-color .2s;}
    input:focus{border-color:var(--dorado);}
    input::placeholder{color:#8B7A70;}

    /* PASSWORD TOGGLE */
    .input-wrap{position:relative;}
    .input-wrap input{padding-right:44px;}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:var(--verde);cursor:pointer;font-size:1.1rem;
      padding:4px;transition:color .2s;}
    .toggle-pw:hover{color:var(--dorado);}

    /* BOTÓN */
    .btn-login{width:100%;background:var(--dorado);color:#2D402E;padding:13px;
      border:none;border-radius:8px;font-size:.88rem;font-weight:800;
      letter-spacing:2px;cursor:pointer;margin-top:8px;
      transition:opacity .2s,transform .1s;text-transform:uppercase;}
    .btn-login:hover:not(:disabled){opacity:.85;}
    .btn-login:active:not(:disabled){transform:scale(.98);}
    .btn-login:disabled{opacity:.4;cursor:not-allowed;}

    /* ERROR / LOADING */
    .msg{text-align:center;font-size:.8rem;padding:10px 14px;border-radius:8px;
      margin-top:14px;display:none;}
    .msg.error{background:rgba(191, 86, 48, .12);border:1px solid rgba(191, 86, 48, .35);
      color:#7F2F1B;display:block;}
    .msg.info{background:rgba(45,64,46,.08);border:1px solid rgba(45,64,46,.25);
      color:var(--verde);display:block;}
    .msg.ok{background:rgba(45,64,46,.1);border:1px solid rgba(45,64,46,.28);
      color:var(--verde);display:block;}

    /* LOADER SPINNER */
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid #2D402E;
      border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;
      vertical-align:middle;margin-right:8px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* INTENTOS */
    .intentos{text-align:center;font-size:.72rem;color:rgba(242, 242, 242, .72);margin-top:20px;}

    /* FOOTER */
    .login-footer{text-align:center;margin-top:24px;font-size:.7rem;color:var(--blanco);}
    .login-footer a{color:var(--blanco);text-decoration:none;}
    .login-footer a:hover{color:var(--dorado);}
  </style>
</head>
<body>

<div class="login-box">
  <div class="logo">
    <span class="escudo"></span>
    <h1>NEXO ADMIN</h1>
    <p>QUIE® · NFC System</p>
  </div>

  <div class="card">
    <h2>Enter your credentials</h2>

    <form id="login-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
          placeholder="Admin username"
          autocomplete="username" required maxlength="50"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password"
            placeholder="••••••••••••"
            autocomplete="current-password" required maxlength="128"/>
          <button type="button" class="toggle-pw" id="toggle-pw" tabindex="-1"
            aria-label="Show password">👁</button>
        </div>
      </div>
      <button class="btn-login" type="submit" id="btn-submit">
        Sign in to Panel
      </button>
    </form>

    <div class="msg" id="msg"></div>
    <div class="intentos" id="intentos-txt"></div>
  </div>

  <div class="login-footer">
    <a href="/">← Back to the public site</a>
  </div>
</div>

<script>
  let intentosFallidos = 0;

  function setMsg(texto, tipo) {
    const el = document.getElementById('msg');
    el.textContent = texto;
    el.className = 'msg ' + tipo;
  }

  document.getElementById('toggle-pw').addEventListener('click', function() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn      = document.getElementById('btn-submit');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      setMsg('Please fill in all fields.', 'error'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Verifying...';
    setMsg('', '');

    try {
      const r = await fetch('/api/auth/login', {
        method:      'POST',
        headers:     { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body:        JSON.stringify({ username, password })
      });
      const data = await r.json();

      if (r.ok) {
        setMsg('Access granted. Redirecting...', 'ok');
        setTimeout(function() { window.location.href = '/admin'; }, 800);
        return;
      }

      intentosFallidos++;
      setMsg(data.error || 'Incorrect credentials.', 'error');
      if (intentosFallidos >= 3) {
        document.getElementById('intentos-txt').textContent =
          intentosFallidos + ' failed attempt(s). IP will be blocked after 5 tries.';
      }
      document.getElementById('password').value = '';
      document.getElementById('password').focus();

    } catch (_) {
      setMsg('Connection error. Make sure the server is running.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign in to Panel';
    }
  });

  fetch('/api/auth/verify', { credentials: 'same-origin' })
    .then(function(r) { if (r.ok) window.location.href = '/admin'; })
    .catch(function() {});
</script>
</body>
</html>
